<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG6X — Free Fire Sensitivity Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1020;
    --bg2:#0d1428;
    --card:#141b2d;
    --card2:#0f1726;
    --blue:#00d4ff;
    --orange:#ff6b00;
    --purple:#8b5cf6;
    --text:#ffffff;
    --muted:#8a93ab;
    --border:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:radial-gradient(circle at 20% -10%, rgba(0,212,255,0.12), transparent 50%),
               radial-gradient(circle at 90% 10%, rgba(255,107,0,0.10), transparent 45%),
               var(--bg);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    height:100%;
    overflow-x:hidden;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  ::selection{background:var(--blue);color:#000;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px;}

  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    min-height:100vh;
    padding-bottom:90px;
    animation:fadeSlide .45s ease both;
  }
  .screen.active{display:flex;}
  @keyframes fadeSlide{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  @media (prefers-reduced-motion: reduce){
    .screen{animation:none;}
  }

  h1,h2,h3{font-family:'Orbitron', sans-serif; letter-spacing:0.5px;}

  /* ---------- SPLASH ---------- */
  #splash{
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:28px;
    background:
      radial-gradient(circle at 50% 30%, rgba(0,212,255,0.18), transparent 55%),
      radial-gradient(circle at 50% 80%, rgba(255,107,0,0.14), transparent 50%),
      var(--bg);
    position:relative;
    overflow:hidden;
  }
  .grid-bg{
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.06) 1px, transparent 1px);
    background-size:36px 36px;
    transform:perspective(500px) rotateX(60deg) translateY(10%) scale(1.6);
    opacity:0.6;
    animation:gridMove 6s linear infinite;
  }
  @keyframes gridMove{ from{background-position:0 0;} to{background-position:0 72px;} }

  .ring-wrap{position:relative; width:140px; height:140px; z-index:2;}
  .ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:4px solid transparent;
    border-top-color:var(--blue);
    border-right-color:var(--orange);
    animation:spin 1.1s linear infinite;
    filter:drop-shadow(0 0 10px var(--blue));
  }
  @keyframes spin{ to{transform:rotate(360deg);} }
  .logo-mark{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron', sans-serif; font-weight:800; font-size:26px;
    background:linear-gradient(135deg, var(--blue), var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .splash-title{
    font-size:42px; font-weight:800; z-index:2;
    background:linear-gradient(135deg, var(--blue), var(--purple) 50%, var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(0,212,255,0.25);
  }
  .splash-sub{ color:var(--muted); font-size:13px; letter-spacing:3px; text-transform:uppercase; z-index:2;}

  /* ---------- TOPBAR / NAV ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 20px 14px;
    position:sticky; top:0; z-index:5;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .brand{
    font-family:'Orbitron'; font-weight:800; font-size:20px;
    background:linear-gradient(135deg, var(--blue), var(--orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .back-btn{
    width:38px;height:38px;border-radius:12px;
    background:var(--card); border:1px solid var(--border);
    color:var(--text); display:flex;align-items:center;justify-content:center;
    cursor:pointer; font-size:18px;
  }
  .back-btn:active{transform:scale(0.92);}

  .content{ padding:0 20px; display:flex; flex-direction:column; gap:18px; flex:1;}

  /* ---------- HOME ---------- */
  .search-bar{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:12px 16px;
  }
  .search-bar input{
    background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;
    font-family:'Poppins';
  }
  .search-bar input::placeholder{color:var(--muted);}
  .section-label{
    display:flex; align-items:center; justify-content:space-between;
    font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px;
  }
  .trend-row{ display:flex; gap:10px; overflow-x:auto; padding-bottom:4px;}
  .trend-chip{
    flex:0 0 auto; padding:8px 14px; border-radius:999px;
    background:linear-gradient(135deg, rgba(0,212,255,0.15), rgba(139,92,246,0.12));
    border:1px solid var(--border); font-size:12px; white-space:nowrap; color:var(--blue);
  }
  .device-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .device-card{
    background:linear-gradient(160deg, var(--card), var(--card2));
    border:1px solid var(--border);
    border-radius:20px;
    padding:18px 16px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transform:perspective(800px) rotateX(2deg);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .device-card::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 100% 0%, rgba(0,212,255,0.18), transparent 60%);
  }
  .device-card:active{ transform:perspective(800px) rotateX(2deg) scale(0.97); }
  .device-card.glow-blue{ box-shadow:0 8px 24px -8px rgba(0,212,255,0.35); }
  .device-card.glow-orange{ box-shadow:0 8px 24px -8px rgba(255,107,0,0.35); }
  .device-icon{ font-size:26px; margin-bottom:10px; display:block;}
  .device-name{ font-weight:600; font-size:15px; position:relative; z-index:1;}
  .device-meta{ font-size:11px; color:var(--muted); margin-top:4px; position:relative; z-index:1;}
  .quick-apply{
    margin-top:auto;
    background:linear-gradient(135deg, var(--orange), #ff9447);
    border:none; color:#1a0900; font-weight:700; font-size:15px;
    padding:16px; border-radius:16px; cursor:pointer;
    box-shadow:0 8px 24px -6px rgba(255,107,0,0.5);
    letter-spacing:0.5px;
  }
  .quick-apply:active{ transform:scale(0.98); }

  /* ---------- SENSITIVITY PAGE ---------- */
  .device-hero{
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(135deg, rgba(0,212,255,0.12), rgba(139,92,246,0.10));
    border:1px solid var(--border); border-radius:18px; padding:16px;
  }
  .device-hero .ico{ font-size:30px; }
  .device-hero h2{ font-size:17px; }
  .device-hero p{ font-size:12px; color:var(--muted); margin-top:2px;}
  .sens-list{ display:flex; flex-direction:column; gap:12px;}
  .sens-item{
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:14px 16px;
  }
  .sens-item-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:10px;}
  .sens-item-top .label{ display:flex; align-items:center; gap:8px; font-weight:600;}
  .sens-item-top .dot{ width:8px; height:8px; border-radius:50%; background:var(--blue); box-shadow:0 0 8px var(--blue);}
  .sens-item-top .val{ color:var(--orange); font-weight:700; font-family:'Orbitron'; font-size:13px;}
  input[type=range]{
    -webkit-appearance:none; width:100%; height:6px; border-radius:4px;
    background:linear-gradient(90deg, var(--blue), var(--purple));
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px;height:20px;border-radius:50%;
    background:var(--text); border:3px solid var(--orange); cursor:pointer;
    box-shadow:0 0 10px rgba(255,107,0,0.7);
  }
  input[type=range]::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;
    background:var(--text); border:3px solid var(--orange); cursor:pointer;
  }

  /* ---------- FIRE BUTTON EDITOR ---------- */
  .editor-stage{
    position:relative;
    height:380px;
    background:
      linear-gradient(160deg, var(--card), var(--card2));
    border:1px solid var(--border);
    border-radius:22px;
    overflow:hidden;
    box-shadow:inset 0 0 60px rgba(0,212,255,0.08);
  }
  .editor-stage::before{
    content:"battlefield preview"; position:absolute; top:10px; left:14px;
    font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
  }
  #fireButton{
    position:absolute; top:240px; left:240px;
    width:80px; height:80px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #ff9447, var(--orange));
    display:flex; align-items:center; justify-content:center;
    font-size:30px; cursor:grab;
    box-shadow:0 0 0 4px rgba(255,107,0,0.25), 0 8px 20px rgba(255,107,0,0.45);
    touch-action:none;
    user-select:none;
  }
  #fireButton:active{ cursor:grabbing; }
  .editor-controls{ display:flex; flex-direction:column; gap:14px;}
  .control-row{ display:flex; align-items:center; gap:14px;}
  .control-row .ico{ font-size:18px; width:24px; text-align:center;}
  .control-row input[type=range]{ flex:1; }
  .control-row .val{ font-family:'Orbitron'; color:var(--blue); font-size:13px; width:46px; text-align:right;}
  .save-preset-btn{
    background:linear-gradient(135deg, var(--blue), var(--purple));
    border:none; color:#04111a; font-weight:700; padding:15px; border-radius:16px;
    cursor:pointer; font-size:14px; box-shadow:0 8px 22px -6px rgba(0,212,255,0.5);
  }
  .save-preset-btn:active{ transform:scale(0.98); }

  /* ---------- GALLERY ---------- */
  .upload-zone{
    border:1.5px dashed rgba(0,212,255,0.4);
    border-radius:18px; padding:28px 16px; text-align:center;
    color:var(--muted); font-size:13px; cursor:pointer;
    background:rgba(0,212,255,0.04);
  }
  .upload-zone strong{ color:var(--blue); display:block; font-size:14px; margin-bottom:4px;}
  .gallery-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .gallery-item{
    aspect-ratio:1; border-radius:16px; overflow:hidden; position:relative;
    background:var(--card); border:1px solid var(--border);
  }
  .gallery-item img{ width:100%; height:100%; object-fit:cover; display:block;}
  .gallery-item .del{
    position:absolute; top:6px; right:6px; width:24px;height:24px; border-radius:50%;
    background:rgba(0,0,0,0.6); color:#fff; border:none; font-size:12px; cursor:pointer;
  }
  .preset-pill{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:12px 14px; font-size:13px;
  }
  .preset-pill .name{ font-weight:600;}
  .preset-pill .meta{ color:var(--muted); font-size:11px;}
  .preset-pill button{
    background:rgba(255,107,0,0.15); color:var(--orange); border:1px solid rgba(255,107,0,0.3);
    border-radius:8px; padding:6px 10px; font-size:11px; cursor:pointer;
  }
  .empty-state{
    text-align:center; color:var(--muted); font-size:12px; padding:18px;
    border:1px solid var(--border); border-radius:14px; background:var(--card2);
  }

  /* ---------- BOTTOM NAV ---------- */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    display:flex; justify-content:space-around;
    background:rgba(13,20,40,0.9);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    padding:10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index:10;
  }
  .nav-btn{
    background:none; border:none; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10px; cursor:pointer; flex:1; padding:4px;
  }
  .nav-btn .ic{ font-size:18px; }
  .nav-btn.active{ color:var(--blue); }
  .nav-btn.active .ic{ filter:drop-shadow(0 0 6px var(--blue)); }

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--card); border:1px solid var(--blue); color:var(--text);
    padding:12px 20px; border-radius:14px; font-size:13px;
    box-shadow:0 0 24px rgba(0,212,255,0.3);
    opacity:0; pointer-events:none; transition:all .3s ease; z-index:50;
    max-width:90%; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .scope-tabs{ display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;}
  .scope-tab{
    flex:0 0 auto; padding:8px 14px; border-radius:12px; font-size:12px;
    background:var(--card2); border:1px solid var(--border); color:var(--muted); cursor:pointer;
  }
  .scope-tab.active{
    background:linear-gradient(135deg, rgba(0,212,255,0.2), rgba(139,92,246,0.15));
    color:var(--blue); border-color:rgba(0,212,255,0.4);
  }
</style>
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <section class="screen active" id="splash">
    <div class="grid-bg"></div>
    <div class="ring-wrap">
      <div class="ring"></div>
      <div class="logo-mark">VG</div>
    </div>
    <div class="splash-title">VG6X</div>
    <div class="splash-sub">Free Fire Sensitivity Lab</div>
  </section>

  <!-- HOME -->
  <section class="screen" id="home">
    <div class="topbar">
      <div class="brand">VG6X</div>
      <div class="back-btn" onclick="goTo('gallery')">🖼️</div>
    </div>
    <div class="content">
      <div class="search-bar">
        <span>🔍</span>
        <input id="deviceSearch" placeholder="Search your device..." oninput="filterDevices()">
      </div>

      <div>
        <div class="section-label"><span>Trending Settings</span></div>
        <div class="trend-row" style="margin-top:10px;">
          <div class="trend-chip">🔥 4x Sniper Pro</div>
          <div class="trend-chip">🎯 Headshot Setup</div>
          <div class="trend-chip">⚡ Low Recoil</div>
          <div class="trend-chip">🧊 Smooth Aim</div>
        </div>
      </div>

      <div>
        <div class="section-label"><span>Choose Your Device</span></div>
        <div class="device-grid" id="deviceGrid" style="margin-top:10px;"></div>
      </div>

      <button class="quick-apply" onclick="quickApply()">⚡ Quick Apply Best Settings</button>
    </div>
  </section>

  <!-- SENSITIVITY PAGE -->
  <section class="screen" id="sensitivity">
    <div class="topbar">
      <div class="back-btn" onclick="goTo('home')">←</div>
      <div class="brand">SENSITIVITY</div>
      <div style="width:38px;"></div>
    </div>
    <div class="content">
      <div class="device-hero">
        <div class="ico" id="sensIcon">📱</div>
        <div>
          <h2 id="sensDeviceName">Device</h2>
          <p>Recommended pro-level settings</p>
        </div>
      </div>

      <div class="scope-tabs" id="scopeTabs"></div>

      <div class="sens-list" id="sensList"></div>

      <button class="save-preset-btn" onclick="goTo('editor')">🎯 Customize Fire Button →</button>
    </div>
  </section>

  <!-- FIRE BUTTON EDITOR -->
  <section class="screen" id="editor">
    <div class="topbar">
      <div class="back-btn" onclick="goTo('sensitivity')">←</div>
      <div class="brand">FIRE BUTTON</div>
      <div style="width:38px;"></div>
    </div>
    <div class="content">
      <div class="editor-stage" id="editorStage">
        <div id="fireButton">🔥</div>
      </div>

      <div class="editor-controls">
        <div class="control-row">
          <span class="ico">📏</span>
          <input type="range" id="sizeSlider" min="50" max="130" value="80" oninput="updateSize(this.value)">
          <span class="val" id="sizeVal">80px</span>
        </div>
        <div class="control-row">
          <span class="ico">🌫️</span>
          <input type="range" id="opacitySlider" min="40" max="100" value="100" oninput="updateOpacity(this.value)">
          <span class="val" id="opacityVal">100%</span>
        </div>
      </div>

      <button class="save-preset-btn" onclick="savePreset()">💾 Save This Preset</button>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="screen" id="gallery">
    <div class="topbar">
      <div class="back-btn" onclick="goTo('home')">←</div>
      <div class="brand">MY PRESETS</div>
      <div style="width:38px;"></div>
    </div>
    <div class="content">
      <label class="upload-zone" for="imgUpload">
        <strong>+ Upload Screenshot</strong>
        Add sensitivity screenshots to your gallery
      </label>
      <input type="file" id="imgUpload" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">

      <div>
        <div class="section-label"><span>Saved Image Gallery</span></div>
        <div class="gallery-grid" id="galleryGrid" style="margin-top:10px;"></div>
      </div>

      <div>
        <div class="section-label"><span>Saved Fire Button Presets</span></div>
        <div class="sens-list" id="presetList" style="margin-top:10px;"></div>
      </div>
    </div>
  </section>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" data-screen="home" onclick="goTo('home')"><span class="ic">🏠</span>Home</button>
    <button class="nav-btn" data-screen="sensitivity" onclick="goTo('sensitivity')"><span class="ic">🎯</span>Sens</button>
    <button class="nav-btn" data-screen="editor" onclick="goTo('editor')"><span class="ic">🔥</span>Fire</button>
    <button class="nav-btn" data-screen="gallery" onclick="goTo('gallery')"><span class="ic">🖼️</span>Gallery</button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const devices = [
  {id:'oneplus', name:'OnePlus', icon:'📱', cls:'glow-blue', meta:'120Hz optimized'},
  {id:'vivo', name:'Vivo', icon:'📲', cls:'glow-orange', meta:'High refresh tuned'},
  {id:'oppo', name:'Oppo', icon:'📱', cls:'glow-blue', meta:'ColorOS calibrated'},
  {id:'redmi', name:'Redmi', icon:'📲', cls:'glow-orange', meta:'MIUI gaming mode'},
  {id:'realme', name:'Realme', icon:'📱', cls:'glow-blue', meta:'Dare to game'},
  {id:'iphone', name:'iPhone', icon:'🍎', cls:'glow-orange', meta:'ProMotion tuned'},
];

const scopes = ['General','Red Dot','2x Scope','4x Scope','Sniper Scope','Free Look'];

// base sensitivity values per device per scope (pro presets)
const sensData = {
  oneplus: [62,58,55,40,35,68],
  vivo:    [60,56,52,38,32,65],
  oppo:    [61,57,54,39,34,66],
  redmi:   [58,54,50,36,30,63],
  realme:  [63,59,56,41,36,69],
  iphone:  [55,52,48,34,28,60],
};

let currentDevice = 'oneplus';
let currentScope = 0;

/* ---------------- NAVIGATION ---------------- */
function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.screen===screenId);
  });
  if(screenId==='gallery') renderGallery();
}

/* ---------------- SPLASH -> HOME ---------------- */
window.addEventListener('DOMContentLoaded', ()=>{
  renderDeviceGrid(devices);
  buildScopeTabs();
  renderSensList();
  setTimeout(()=>{ goTo('home'); }, 1900);
});

/* ---------------- HOME ---------------- */
function renderDeviceGrid(list){
  const grid = document.getElementById('deviceGrid');
  grid.innerHTML = list.map(d=>`
    <div class="device-card ${d.cls}" onclick="openDevice('${d.id}')">
      <span class="device-icon">${d.icon}</span>
      <div class="device-name">${d.name}</div>
      <div class="device-meta">${d.meta}</div>
    </div>
  `).join('');
}
function filterDevices(){
  const q = document.getElementById('deviceSearch').value.toLowerCase();
  renderDeviceGrid(devices.filter(d=>d.name.toLowerCase().includes(q)));
}
function openDevice(id){
  currentDevice = id;
  const d = devices.find(x=>x.id===id);
  document.getElementById('sensIcon').textContent = d.icon;
  document.getElementById('sensDeviceName').textContent = d.name + ' Settings';
  renderSensList();
  goTo('sensitivity');
}
function quickApply(){
  showToast('⚡ Best settings applied for ' + devices.find(d=>d.id===currentDevice).name);
}

/* ---------------- SENSITIVITY ---------------- */
function buildScopeTabs(){
  const wrap = document.getElementById('scopeTabs');
  wrap.innerHTML = scopes.map((s,i)=>`
    <div class="scope-tab ${i===0?'active':''}" data-i="${i}" onclick="selectScope(${i})">${s}</div>
  `).join('');
}
function selectScope(i){
  currentScope = i;
  document.querySelectorAll('.scope-tab').forEach((t,idx)=>t.classList.toggle('active', idx===i));
}
function renderSensList(){
  const list = document.getElementById('sensList');
  const values = sensData[currentDevice];
  list.innerHTML = scopes.map((s,i)=>`
    <div class="sens-item">
      <div class="sens-item-top">
        <span class="label"><span class="dot"></span>${s}</span>
        <span class="val" id="val-${i}">${values[i]}</span>
      </div>
      <input type="range" min="0" max="100" value="${values[i]}" oninput="document.getElementById('val-${i}').textContent=this.value">
    </div>
  `).join('');
}

/* ---------------- FIRE BUTTON EDITOR ---------------- */
const fireBtn = document.getElementById('fireButton');
const stage = document.getElementById('editorStage');
let dragOffset = {x:0,y:0};

function clampToStage(left, top){
  const w = fireBtn.offsetWidth, h = fireBtn.offsetHeight;
  const maxL = stage.clientWidth - w;
  const maxT = stage.clientHeight - h;
  return { left: Math.min(Math.max(0,left), maxL), top: Math.min(Math.max(0,top), maxT) };
}

function startDrag(clientX, clientY){
  const rect = fireBtn.getBoundingClientRect();
  dragOffset.x = clientX - rect.left;
  dragOffset.y = clientY - rect.top;
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', stopDrag);
  document.addEventListener('touchmove', onDragMoveTouch, {passive:false});
  document.addEventListener('touchend', stopDrag);
}
function onDragMove(e){ moveFireBtn(e.clientX, e.clientY); }
function onDragMoveTouch(e){
  e.preventDefault();
  const t = e.touches[0];
  moveFireBtn(t.clientX, t.clientY);
}
function moveFireBtn(clientX, clientY){
  const stageRect = stage.getBoundingClientRect();
  let left = clientX - stageRect.left - dragOffset.x;
  let top = clientY - stageRect.top - dragOffset.y;
  const c = clampToStage(left, top);
  fireBtn.style.left = c.left + 'px';
  fireBtn.style.top = c.top + 'px';
}
function stopDrag(){
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', stopDrag);
  document.removeEventListener('touchmove', onDragMoveTouch);
  document.removeEventListener('touchend', stopDrag);
}
fireBtn.addEventListener('mousedown', e=>startDrag(e.clientX, e.clientY));
fireBtn.addEventListener('touchstart', e=>{ const t=e.touches[0]; startDrag(t.clientX, t.clientY); }, {passive:true});
fireBtn.ondragstart = ()=>false;

function updateSize(v){
  fireBtn.style.width = v+'px';
  fireBtn.style.height = v+'px';
  document.getElementById('sizeVal').textContent = v+'px';
  const rect = fireBtn.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  const c = clampToStage(rect.left-stageRect.left, rect.top-stageRect.top);
  fireBtn.style.left = c.left+'px';
  fireBtn.style.top = c.top+'px';
}
function updateOpacity(v){
  fireBtn.style.opacity = v/100;
  document.getElementById('opacityVal').textContent = v+'%';
}

function savePreset(){
  const presets = JSON.parse(localStorage.getItem('vg6x_presets')||'[]');
  const preset = {
    id: Date.now(),
    device: currentDevice,
    size: document.getElementById('sizeSlider').value,
    opacity: document.getElementById('opacitySlider').value,
    left: fireBtn.style.left || '240px',
    top: fireBtn.style.top || '240px',
  };
  presets.push(preset);
  localStorage.setItem('vg6x_presets', JSON.stringify(presets));
  showToast('💾 Preset saved!');
}

/* ---------------- GALLERY ---------------- */
function handleUpload(e){
  const files = Array.from(e.target.files);
  const images = JSON.parse(localStorage.getItem('vg6x_images')||'[]');
  let pending = files.length;
  if(!pending) return;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      images.push({id:Date.now()+Math.random(), src: ev.target.result});
      pending--;
      if(pending===0){
        localStorage.setItem('vg6x_images', JSON.stringify(images));
        renderGallery();
        showToast('🖼️ Screenshot(s) added');
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function deleteImage(id){
  let images = JSON.parse(localStorage.getItem('vg6x_images')||'[]');
  images = images.filter(img=>img.id!==id);
  localStorage.setItem('vg6x_images', JSON.stringify(images));
  renderGallery();
}
function deletePreset(id){
  let presets = JSON.parse(localStorage.getItem('vg6x_presets')||'[]');
  presets = presets.filter(p=>p.id!==id);
  localStorage.setItem('vg6x_presets', JSON.stringify(presets));
  renderGallery();
}
function applyPreset(id){
  const presets = JSON.parse(localStorage.getItem('vg6x_presets')||'[]');
  const p = presets.find(x=>x.id===id);
  if(!p) return;
  currentDevice = p.device;
  goTo('editor');
  document.getElementById('sizeSlider').value = p.size;
  document.getElementById('opacitySlider').value = p.opacity;
  updateSize(p.size);
  updateOpacity(p.opacity);
  fireBtn.style.left = p.left;
  fireBtn.style.top = p.top;
  showToast('✅ Preset applied');
}
function renderGallery(){
  const images = JSON.parse(localStorage.getItem('vg6x_images')||'[]');
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = images.length ? images.map(img=>`
    <div class="gallery-item">
      <img src="${img.src}" alt="sensitivity screenshot">
      <button class="del" onclick="deleteImage(${img.id})">✕</button>
    </div>
  `).join('') : '<div class="empty-state" style="grid-column:1/-1;">No screenshots yet — upload your first one</div>';

  const presets = JSON.parse(localStorage.getItem('vg6x_presets')||'[]');
  const presetList = document.getElementById('presetList');
  presetList.innerHTML = presets.length ? presets.map(p=>{
    const d = devices.find(x=>x.id===p.device) || {name:'Unknown'};
    return `
    <div class="preset-pill">
      <div>
        <div class="name">${d.name} • ${p.size}px button</div>
        <div class="meta">Opacity ${p.opacity}% • saved ${new Date(p.id).toLocaleDateString()}</div>
      </div>
      <div style="display:flex; gap:6px;">
        <button onclick="applyPreset(${p.id})">Apply</button>
        <button onclick="deletePreset(${p.id})" style="background:rgba(255,255,255,0.08); color:var(--muted); border-color:var(--border);">Del</button>
      </div>
    </div>`;
  }).join('') : '<div class="empty-state">No presets saved yet — create one in Fire Button Editor</div>';
}

/* ---------------- TOAST ---------------- */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
